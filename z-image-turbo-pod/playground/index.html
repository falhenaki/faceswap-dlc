<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Z-Image Playground</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0f1115;
      --card: #181c24;
      --text: #e8eaef;
      --muted: #8b929e;
      --accent: #5b8cff;
      --err: #f87171;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f5f7;
        --card: #fff;
        --text: #1a1d23;
        --muted: #5c6370;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem clamp(1rem, 4vw, 2rem) 3rem;
      line-height: 1.5;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.25rem; }
    .sub code { font-size: 0.8em; word-break: break-all; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.25rem 1.35rem;
      max-width: 42rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
    }
    label { display: block; font-weight: 600; font-size: 0.8rem; margin-top: 1rem; }
    label:first-of-type { margin-top: 0; }
    textarea, input[type="text"], input[type="number"] {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.2);
      color: inherit;
      font: inherit;
    }
    textarea { min-height: 7rem; resize: vertical; }
    .row { display: grid; grid-template-columns: repeat(auto-fill, minmax(7rem, 1fr)); gap: 0.75rem; margin-top: 0.35rem; }
    .row input { margin-top: 0; }
    button {
      margin-top: 1.1rem;
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 0.8rem; margin-top: 0.35rem; }
    .preview-wrap { margin-top: 0.5rem; }
    .preview-wrap img { max-width: 100%; max-height: 180px; border-radius: 8px; }
    #result { margin-top: 1.75rem; }
    #result img {
      max-width: min(100%, 1024px);
      border-radius: 10px;
      display: block;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
    }
    .err { color: var(--err); margin-top: 0.75rem; white-space: pre-wrap; font-size: 0.9rem; }
    .status { margin-top: 0.65rem; font-size: 0.875rem; color: var(--muted); }
  </style>
</head>
<body>
  <h1>Z-Image Playground</h1>
  <p class="sub">
    Local proxy → <code id="remoteHost">…</code><br />
    The GPU API is <strong>text-to-image</strong> only. Reference images are preview-only (not sent to the model).
  </p>

  <div class="card">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Describe the image you want…"></textarea>

    <label for="ref">Reference image (optional, local preview only)</label>
    <input type="file" id="ref" accept="image/*" />
    <p class="hint">Not uploaded to RunPod — ZImagePipeline here has no img2img endpoint.</p>
    <div class="preview-wrap" id="previewBox" hidden>
      <img id="preview" alt="Reference preview" />
    </div>

    <div class="row">
      <div>
        <label for="w">Width</label>
        <input type="number" id="w" value="1024" min="256" max="2048" step="8" />
      </div>
      <div>
        <label for="h">Height</label>
        <input type="number" id="h" value="1024" min="256" max="2048" step="8" />
      </div>
      <div>
        <label for="steps">Steps</label>
        <input type="number" id="steps" value="9" min="1" max="50" />
      </div>
      <div>
        <label for="seed">Seed (empty = random)</label>
        <input type="number" id="seed" placeholder="optional" />
      </div>
    </div>

    <button type="button" id="go">Generate</button>
    <p class="status" id="status"></p>
    <p class="err" id="err" hidden></p>
  </div>

  <div id="result"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    fetch("/api/config")
      .then((r) => r.json())
      .then((c) => {
        $("remoteHost").textContent = c.remote_host || "(unknown)";
      })
      .catch(() => {});

    $("ref").addEventListener("change", () => {
      const f = $("ref").files[0];
      if (!f) {
        $("previewBox").hidden = true;
        return;
      }
      $("preview").src = URL.createObjectURL(f);
      $("previewBox").hidden = false;
    });

    $("go").addEventListener("click", async () => {
      const prompt = $("prompt").value.trim();
      if (!prompt) {
        $("err").hidden = false;
        $("err").textContent = "Enter a prompt.";
        return;
      }
      $("err").hidden = true;
      $("go").disabled = true;
      $("status").textContent = "Sending request… (generation can take minutes)";
      $("result").innerHTML = "";

      const body = {
        prompt,
        width: Number($("w").value) || 1024,
        height: Number($("h").value) || 1024,
        num_inference_steps: Number($("steps").value) || 9,
        guidance_scale: 0,
      };
      const s = $("seed").value;
      if (s !== "") body.seed = Number(s);

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(text.slice(0, 400) || "Invalid JSON response");
        }
        if (!res.ok) {
          throw new Error(data.detail || data.error || text.slice(0, 500));
        }
        if (!data.image_base64) {
          throw new Error("No image in response");
        }
        $("status").textContent = "Done.";
        const img = document.createElement("img");
        img.src = "data:image/png;base64," + data.image_base64;
        img.alt = "Generated";
        $("result").appendChild(img);
      } catch (e) {
        $("err").hidden = false;
        $("err").textContent = String(e.message || e);
        $("status").textContent = "";
      } finally {
        $("go").disabled = false;
      }
    });
  </script>
</body>
</html>
